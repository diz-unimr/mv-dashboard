<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MVH-Dashboard :: Login</title>
    <link rel="stylesheet" href="/mv-dashboard/assets/main.css">
</head>
<body>
<nav>
    <span class="nav-name">MVH-Dashboard</span>
</nav>
<main>
    <div class="login-form">
        <form action="/mv-dashboard/login" method="post">
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>
</main>
</body>
</html>
