name: CI

on:
  pull_request:
    branches: [ 'main', 'master' ]
  push:
    branches: [ 'main', 'master' ]
  release:
    types: [ 'created' ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build assets
        run: |
          npm install
          npm run build
      - name: Run tests
        run: cargo test --release --verbose
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs:
      - test
    permissions:
      contents: write
      packages: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Image build
        run: |
          docker build -t ghcr.io/${{ github.repository }} .

      - name: Login to Docker Hub
        if: ${{ github.event_name == 'release' && github.event.action == 'created' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Push
        if: ${{ github.event_name == 'release' && github.event.action == 'created' }}
        run: |
          docker tag ghcr.io/${{ github.repository }} ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}

      - name: Image Save
        if: ${{ github.event_name == 'release' && github.event.action == 'created' }}
        run: docker save -o ${{ github.event.repository.name }}-image.tar ghcr.io/${{ github.repository }}

      - name: Image Tar
        if: ${{ github.event_name == 'release' && github.event.action == 'created' }}
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ github.event.repository.name }}-image.tar